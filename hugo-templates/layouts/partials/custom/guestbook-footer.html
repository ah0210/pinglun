<!-- Hugo: layouts/partials/custom/guestbook-footer.html -->
<!-- 页面底部：widget.js 懒加载 + 暗色模式自动同步 -->
{{- if .Site.Params.guestbook.enable | default false }}
{{- $widgetHost := .Site.Params.guestbook.apiBase | default "https://guestbook.17you.com" -}}
{{- $theme := .Site.Params.guestbook.theme | default "auto" -}}
<script>
(function() {
  var widgetUrl = '{{ $widgetHost }}/widget.js';

  /** 懒加载：当留言板容器即将进入视口时再加载 widget.js */
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        observer.disconnect();
        var script = document.createElement('script');
        script.src = widgetUrl;
        script.defer = true;
        document.head.appendChild(script);
      }
    });
  }, { rootMargin: '200px' });

  document.querySelectorAll('guestbook-widget, gb-auth-bar, [id^="guestbook-"]').forEach(function(el) {
    observer.observe(el);
  });

  /** 降级：不支持 IntersectionObserver 的浏览器直接 defer 加载 */
  if (!('IntersectionObserver' in window)) {
    var s = document.createElement('script');
    s.src = widgetUrl; s.defer = true;
    document.head.appendChild(s);
  }

  {{- if eq $theme "auto" }}
  /** 暗色模式同步：监听 html.dark class 切换，自动更新所有 Widget 主题 */
  function syncGbTheme() {
    var isDark = document.documentElement.classList.contains('dark');
    document.querySelectorAll('guestbook-widget, gb-auth-bar').forEach(function(el) {
      el.setAttribute('theme', isDark ? 'dark' : 'light');
    });
  }
  new MutationObserver(syncGbTheme)
    .observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  syncGbTheme();
  {{- end }}
})();
</script>
{{- end }}
