<!-- Hugo: layouts/partials/custom/guestbook-footer.html -->
<!-- 页面底部：widget.js 懒加载 + 评论计数同步 + 暗色模式自动同步 -->
{{- if .Site.Params.guestbook.enable | default false }}
{{- $widgetHost := .Site.Params.guestbook.apiBase | default "https://guestbook.17you.com" -}}
{{- $theme := .Site.Params.guestbook.theme | default "auto" -}}
<script>
window.GUESTBOOK_API_BASE = '{{ $widgetHost }}';
</script>
<script src="{{ $widgetHost }}/guestbook-count.js" defer></script>
<script>
(function() {
  var widgetUrl = '{{ $widgetHost }}/widget.js';
  var widgetLoaded = false;

  /**
   * 监听 Widget 发射的 gb-comment-count 事件
   * 更新 FixIt 主题文章元信息区的 .guestbook-comment-count[data-path] 元素
   * 事件由 GuestBoard.ce.vue 在留言列表加载/变化时发射
   */
  document.addEventListener('gb-comment-count', function(e) {
    var detail = e.detail || {};
    var count = detail.count || 0;
    var hasMore = !!detail.hasMore;
    var label = count === 0 ? '0' : (hasMore ? count + '+' : String(count));
    document.querySelectorAll('.guestbook-comment-count[data-path]').forEach(function(el) {
      var path = el.getAttribute('data-path');
      if (path && detail.pageId && path !== detail.pageId) return;
      el.textContent = label;
    });
  });

  /**
   * 监听 Widget 发射的 gb-page-stats 事件
   * 更新宿主页面中 .guestbook-view-count[data-path] 元素的浏览量
   * 事件由 GuestBoard.ce.vue 在页面统计加载/更新时发射
   */
  document.addEventListener('gb-page-stats', function(e) {
    var detail = e.detail || {};
    var views = detail.views || 0;
    var visitors = detail.visitors || 0;
    document.querySelectorAll('.guestbook-view-count[data-path]').forEach(function(el) {
      var path = el.getAttribute('data-path');
      if (path && detail.pageId && path !== detail.pageId) return;
      var format = el.getAttribute('data-format') || '{views}';
      el.textContent = format
        .replace('{views}', views)
        .replace('{visitors}', visitors);
    });
  });

  /** 加载 widget.js（只加载一次） */
  function loadWidget() {
    if (widgetLoaded) return;
    widgetLoaded = true;
    var script = document.createElement('script');
    script.src = widgetUrl;
    script.defer = true;
    document.head.appendChild(script);
  }

  /**
   * 懒加载：当留言板容器即将进入视口时再加载 widget.js
   * 支持多次调用（pjax 翻页后新元素也需要 observe）
   */
  function observeWidget() {
    var targets = document.querySelectorAll('guestbook-widget, gb-auth-bar, [id^="guestbook-"]');
    if (!targets.length) return;
    if (widgetLoaded) return;

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          observer.disconnect();
          loadWidget();
        }
      });
    }, { rootMargin: '200px' });

    targets.forEach(function(el) { observer.observe(el); });
  }

  /** 降级：不支持 IntersectionObserver 的浏览器直接 defer 加载 */
  if (!('IntersectionObserver' in window)) {
    if (document.querySelector('guestbook-widget, gb-auth-bar, [id^="guestbook-"]')) {
      loadWidget();
    }
  } else {
    observeWidget();
  }

  {{- if eq $theme "auto" }}
  /** 暗色模式同步：监听 html.dark class 切换，自动更新所有 Widget 主题 */
  function syncGbTheme() {
    var isDark = document.documentElement.classList.contains('dark');
    document.querySelectorAll('guestbook-widget, gb-auth-bar').forEach(function(el) {
      el.setAttribute('theme', isDark ? 'dark' : 'light');
    });
  }
  new MutationObserver(syncGbTheme)
    .observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  syncGbTheme();
  {{- end }}

  /**
   * pjax/swup 翻页后：重新 observe 新出现的 Widget 元素 + 同步暗色模式
   * widget.js 只加载一次，但 IntersectionObserver 需重新绑定新元素
   */
  document.addEventListener('pjax:complete', function () {
    observeWidget();
    {{- if eq $theme "auto" }}syncGbTheme();{{- end }}
  });
  document.addEventListener('swup:contentReplaced', function () {
    observeWidget();
    {{- if eq $theme "auto" }}syncGbTheme();{{- end }}
  });
})();
</script>
{{- end }}
