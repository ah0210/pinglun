<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自游人知趣</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 14px;
      color: #999;
      margin-bottom: 32px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: #667eea;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      min-height: 48px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-zhihu {
      background: #fff;
      color: #333;
      border: 1px solid #e0e0e0;
      gap: 10px;
    }
    .btn-zhihu:hover { background: #f7f8fa; }
    .btn-zhihu:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-zhihu img {
      width: 22px;
      height: 22px;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #ccc;
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }
    .divider span {
      padding: 0 16px;
    }
    .error-msg {
      background: #fff2f0;
      color: #e74c3c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error-msg.show { display: block; }
    .success-area {
      display: none;
      text-align: center;
    }
    .success-area.show { display: block; }
    .success-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 12px;
      object-fit: cover;
    }
    .success-name {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .success-role {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
    }
    .success-redirect {
      font-size: 13px;
      color: #667eea;
    }
    .login-form { display: block; }
    .login-form.hidden { display: none; }
    .register-form { display: none; }
    .register-form.show { display: block; }
    .link-row {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #999;
    }
    .link-row a, .link-row .link-btn {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font: inherit;
      padding: 0;
    }
    .link-row a:hover, .link-row .link-btn:hover { text-decoration: underline; }
    #turnstile-container {
      margin-bottom: 16px;
    }
    .zhihu-hint {
      background: #f0f5ff;
      color: #3b5998;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; border-radius: 12px; }
      .login-title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 id="page-title" class="login-title">自游人知趣</h1>
    <p id="page-subtitle" class="login-subtitle">登录以继续</p>

    <div id="error-msg" class="error-msg"></div>

    <!-- 登录表单 -->
    <div id="login-form" class="login-form">
      <div class="field">
        <label for="login-input">用户名或邮箱</label>
        <input id="login-input" type="text" placeholder="请输入用户名或邮箱" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password-input">密码</label>
        <input id="password-input" type="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>
      <div id="turnstile-container"></div>
      <button id="btn-login" class="btn btn-primary" type="button">登 录</button>

      <div class="divider"><span>或</span></div>

      <button id="btn-zhihu" class="btn btn-zhihu" type="button">
        <img src="https://guestbook.17you.com/images/zhihu.png" alt="知乎" />
        知乎登录
      </button>

      <div class="link-row">
        没有账号？<button type="button" class="link-btn" id="go-register">注册</button>
      </div>
    </div>

    <!-- 注册表单（知乎跳转或手动注册时显示） -->
    <div id="register-form" class="register-form">
      <div id="zhihu-hint" class="zhihu-hint" style="display:none;">
        &#128274; 请补充邮箱和手机号以完成注册
      </div>
      <div class="field">
        <label for="reg-username">用户名</label>
        <input id="reg-username" type="text" placeholder="2-30位，中英文/数字/下划线" autocomplete="username" />
      </div>
      <div class="field">
        <label for="reg-email">邮箱</label>
        <input id="reg-email" type="email" placeholder="example@domain.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="reg-phone">手机号</label>
        <input id="reg-phone" type="tel" maxlength="11" placeholder="中国大陆11位手机号" autocomplete="tel" />
      </div>
      <div class="field">
        <label for="reg-password">密码</label>
        <input id="reg-password" type="password" placeholder="8-20位，含字母和数字" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="reg-confirm">确认密码</label>
        <input id="reg-confirm" type="password" placeholder="再次输入密码" autocomplete="new-password" />
      </div>
      <div id="turnstile-reg-container"></div>
      <button id="btn-register" class="btn btn-primary" type="button">注 册</button>

      <div class="link-row">
        已有账号？<button type="button" class="link-btn" id="go-login">登录</button>
      </div>
    </div>

    <!-- 登录成功 -->
    <div id="success-area" class="success-area">
      <img id="success-avatar" class="success-avatar" src="" alt="头像" />
      <div id="success-name" class="success-name"></div>
      <div id="success-role" class="success-role"></div>
      <div id="success-redirect" class="success-redirect"></div>
    </div>
  </div>

  <script>
    (function() {
      var API_BASE = window.location.origin;
      var DEFAULT_REDIRECT = 'https://www.17you.com/';
      var REDIRECT_DELAY = 3000;

      /** Turnstile 相关状态 */
      var turnstileSiteKey = '';
      var forceSkipTurnstile = false;
      var turnstileWidgetId = null;
      var turnstileRegWidgetId = null;

      /** 知乎预填信息 */
      var zhihuPrefill = null;

      var loginForm = document.getElementById('login-form');
      var registerForm = document.getElementById('register-form');
      var errorEl = document.getElementById('error-msg');
      var successArea = document.getElementById('success-area');
      var pageTitle = document.getElementById('page-title');
      var pageSubtitle = document.getElementById('page-subtitle');
      var loginInput = document.getElementById('login-input');
      var passwordInput = document.getElementById('password-input');
      var btnLogin = document.getElementById('btn-login');
      var btnZhihu = document.getElementById('btn-zhihu');
      var btnRegister = document.getElementById('btn-register');
      var goRegister = document.getElementById('go-register');
      var goLogin = document.getElementById('go-login');
      var zhihuHint = document.getElementById('zhihu-hint');

      var regUsername = document.getElementById('reg-username');
      var regEmail = document.getElementById('reg-email');
      var regPhone = document.getElementById('reg-phone');
      var regPassword = document.getElementById('reg-password');
      var regConfirm = document.getElementById('reg-confirm');

      /** 切换到注册表单 */
      function showRegisterForm() {
        loginForm.classList.add('hidden');
        registerForm.classList.add('show');
        pageTitle.textContent = '注册账号';
        pageSubtitle.textContent = '创建您的账号';
        hideError();
        renderRegTurnstileWidget();
      }

      /** 切换到登录表单 */
      function showLoginForm() {
        registerForm.classList.remove('show');
        loginForm.classList.remove('hidden');
        pageTitle.textContent = '自游人知趣';
        pageSubtitle.textContent = '登录以继续';
        hideError();
        removeRegTurnstileWidget();
      }

      /**
       * 页面加载时获取配置，决定是否渲染 Turnstile
       */
      function initConfig() {
        fetch(API_BASE + '/api/v1/config')
          .then(function(r) { return r.json(); })
          .then(function(resp) {
            if (resp.success && resp.data) {
              turnstileSiteKey = resp.data.turnstileSiteKey || '';
              forceSkipTurnstile = !!resp.data.forceSkipTurnstile;
              if (!forceSkipTurnstile && turnstileSiteKey) {
                loadTurnstileScript();
              }
            }
          })
          .catch(function() {});
      }

      /** 动态加载 Turnstile JS SDK */
      function loadTurnstileScript() {
        if (document.getElementById('turnstile-sdk')) return;
        var script = document.createElement('script');
        script.id = 'turnstile-sdk';
        script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
        script.async = true;
        script.onload = function() {
          renderTurnstileWidget();
          if (registerForm.classList.contains('show')) {
            renderRegTurnstileWidget();
          }
        };
        document.head.appendChild(script);
      }

      /** 渲染登录 Turnstile Widget（execute-only 模式，点登录时才触发验证） */
      function renderTurnstileWidget() {
        var turnstile = window.turnstile;
        if (!turnstile || !turnstileSiteKey) return;
        removeTurnstileWidget();
        try {
          turnstileWidgetId = turnstile.render('#turnstile-container', {
            sitekey: turnstileSiteKey,
            size: 'compact',
            execution: 'execute-only',
            callback: function() {},
            'error-callback': function() { removeTurnstileWidget(); },
            'expired-callback': function() { removeTurnstileWidget(); }
          });
        } catch (e) {
          console.warn('Turnstile render failed:', e);
        }
      }

      /** 渲染注册 Turnstile Widget（execute-only 模式，点注册时才触发验证） */
      function renderRegTurnstileWidget() {
        var turnstile = window.turnstile;
        if (!turnstile || !turnstileSiteKey) return;
        removeRegTurnstileWidget();
        try {
          turnstileRegWidgetId = turnstile.render('#turnstile-reg-container', {
            sitekey: turnstileSiteKey,
            size: 'compact',
            execution: 'execute-only',
            callback: function() {},
            'error-callback': function() { removeRegTurnstileWidget(); },
            'expired-callback': function() { removeRegTurnstileWidget(); }
          });
        } catch (e) {
          console.warn('Turnstile reg render failed:', e);
        }
      }

      /** 移除登录 Turnstile Widget */
      function removeTurnstileWidget() {
        var turnstile = window.turnstile;
        if (turnstile && turnstileWidgetId) {
          try { turnstile.remove(turnstileWidgetId); } catch (e) {}
          turnstileWidgetId = null;
        }
      }

      /** 移除注册 Turnstile Widget */
      function removeRegTurnstileWidget() {
        var turnstile = window.turnstile;
        if (turnstile && turnstileRegWidgetId) {
          try { turnstile.remove(turnstileRegWidgetId); } catch (e) {}
          turnstileRegWidgetId = null;
        }
      }

      /** 获取登录 Turnstile token（execute-only 模式，先触发验证再取 token） */
      function getTurnstileToken() {
        if (forceSkipTurnstile) return Promise.resolve('');
        var turnstile = window.turnstile;
        if (!turnstile || !turnstileWidgetId) return Promise.resolve('');
        return new Promise(function(resolve) {
          var timeout = setTimeout(function() { resolve(''); }, 15000);
          try {
            turnstile.execute(turnstileWidgetId);
            /** 轮询等待 token 生成（execute 触发验证，callback 中 token 写入 widget） */
            var pollInterval = setInterval(function() {
              try {
                var token = turnstile.getResponse(turnstileWidgetId);
                if (token) {
                  clearTimeout(timeout);
                  clearInterval(pollInterval);
                  turnstile.reset(turnstileWidgetId);
                  resolve(token);
                }
              } catch (e) {
                clearTimeout(timeout);
                clearInterval(pollInterval);
                resolve('');
              }
            }, 200);
          } catch (e) { clearTimeout(timeout); resolve(''); }
        });
      }

      /** 获取注册 Turnstile token（execute-only 模式） */
      function getRegTurnstileToken() {
        if (forceSkipTurnstile) return Promise.resolve('');
        var turnstile = window.turnstile;
        if (!turnstile || !turnstileRegWidgetId) return Promise.resolve('');
        return new Promise(function(resolve) {
          var timeout = setTimeout(function() { resolve(''); }, 15000);
          try {
            turnstile.execute(turnstileRegWidgetId);
            var pollInterval = setInterval(function() {
              try {
                var token = turnstile.getResponse(turnstileRegWidgetId);
                if (token) {
                  clearTimeout(timeout);
                  clearInterval(pollInterval);
                  turnstile.reset(turnstileRegWidgetId);
                  resolve(token);
                }
              } catch (e) {
                clearTimeout(timeout);
                clearInterval(pollInterval);
                resolve('');
              }
            }, 200);
          } catch (e) { clearTimeout(timeout); resolve(''); }
        });
      }

      /** 从 URL hash 或 query 中获取重定向地址 */
      function getRedirectUrl() {
        var hash = window.location.hash;
        if (hash) {
          var params = new URLSearchParams(hash.substring(1));
          var redirect = params.get('redirect');
          if (redirect) return redirect;
        }
        var search = new URLSearchParams(window.location.search);
        return search.get('redirect') || DEFAULT_REDIRECT;
      }

      /** 显示错误信息 */
      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('show');
      }

      /** 隐藏错误信息 */
      function hideError() {
        errorEl.classList.remove('show');
      }

      /** 登录成功后显示用户信息并跳转 */
      function onLoginSuccess(data) {
        localStorage.setItem('guestbook_access_token', data.accessToken);

        loginForm.classList.add('hidden');
        registerForm.classList.remove('show');
        successArea.classList.add('show');

        document.getElementById('success-avatar').src = data.user.avatar || '';
        document.getElementById('success-name').textContent = data.user.displayName || data.user.username;
        document.getElementById('success-role').textContent = data.user.role === 'admin' ? '管理员' : '用户';

        var redirectUrl = getRedirectUrl();
        document.getElementById('success-redirect').textContent = REDIRECT_DELAY / 1000 + ' 秒后跳转...';

        setTimeout(function() {
          window.location.href = redirectUrl;
        }, REDIRECT_DELAY);
      }

      /** 清理 URL hash */
      function cleanHash() {
        if (window.history.replaceState) {
          window.history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      }

      /**
       * 处理 URL hash 中的指令
       * 支持: #oauth_error=xxx, #access_token=xxx, #register?zhihu_uid=xxx&zhihu_name=xxx
       */
      function handleHashCallback() {
        var hash = window.location.hash;
        if (!hash) return;

        var fragment = hash.substring(1);

        /**
         * 检查是否为注册跳转（知乎信息不完整时回调）
         * 格式: #register?zhihu_uid=xxx&zhihu_name=xxx&zhihu_email=xxx
         */
        if (fragment.startsWith('register?')) {
          var regParams = new URLSearchParams(fragment.substring(8));
          zhihuPrefill = {
            uid: regParams.get('zhihu_uid') || '',
            fullname: regParams.get('zhihu_name') || '',
            email: regParams.get('zhihu_email') || '',
            phone_no: regParams.get('zhihu_phone') || '',
            avatar_path: regParams.get('zhihu_avatar') || '',
            redirect: regParams.get('redirect') || ''
          };

          showRegisterForm();

          /** 预填知乎信息 */
          if (zhihuPrefill.fullname) regUsername.value = zhihuPrefill.fullname;
          if (zhihuPrefill.email) regEmail.value = zhihuPrefill.email;
          if (zhihuPrefill.phone_no) regPhone.value = zhihuPrefill.phone_no;

          /** 如果 email 和 phone 都有值，隐藏提示；否则显示 */
          if (!zhihuPrefill.email || !zhihuPrefill.phone_no) {
            zhihuHint.style.display = 'flex';
          }

          cleanHash();
          return;
        }

        var params = new URLSearchParams(fragment);

        /** 检查 OAuth 错误 */
        var oauthError = params.get('oauth_error');
        if (oauthError) {
          var debugUrl = params.get('debug_url');
          var errorMsg = decodeURIComponent(oauthError);
          if (debugUrl) {
            errorMsg += '\n\n调试信息: ' + decodeURIComponent(debugUrl);
          }
          showError(errorMsg);
          cleanHash();
          return;
        }

        /** 提取 access_token（OAuth 直接登录成功） */
        var accessToken = params.get('access_token');
        if (!accessToken) return;

        localStorage.setItem('guestbook_access_token', accessToken);
        cleanHash();

        fetch(API_BASE + '/api/v1/auth/me', {
          headers: { 'Authorization': 'Bearer ' + accessToken }
        })
        .then(function(r) { return r.json(); })
        .then(function(resp) {
          if (resp.success && resp.data) {
            onLoginSuccess({ accessToken: accessToken, user: resp.data });
          } else {
            showError('获取用户信息失败');
            localStorage.removeItem('guestbook_access_token');
          }
        })
        .catch(function() {
          showError('网络错误，请重试');
          localStorage.removeItem('guestbook_access_token');
        });
      }

      /** 普通登录 */
      btnLogin.addEventListener('click', function() {
        if (btnLogin.disabled) return;
        hideError();
        var login = loginInput.value.trim();
        var password = passwordInput.value;

        if (!login || !password) {
          showError('请填写用户名和密码');
          return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = '登录中...';

        getTurnstileToken().then(function(turnstileToken) {
          fetch(API_BASE + '/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login: login, password: password, turnstileToken: turnstileToken })
          })
          .then(function(r) { return r.json(); })
          .then(function(resp) {
            if (resp.success && resp.data) {
              onLoginSuccess(resp.data);
            } else {
              showError(resp.error ? resp.error.message : '登录失败');
              renderTurnstileWidget();
            }
          })
          .catch(function() { showError('网络错误，请重试'); })
          .finally(function() {
            btnLogin.disabled = false;
            btnLogin.textContent = '登 录';
          });
        });
      });

      /** 回车登录 */
      passwordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnLogin.click();
      });
      loginInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') passwordInput.focus();
      });

      /** 注册 */
      btnRegister.addEventListener('click', function() {
        if (btnRegister.disabled) return;
        hideError();

        var username = regUsername.value.trim();
        var email = regEmail.value.trim();
        var phone = regPhone.value.trim();
        var password = regPassword.value;
        var confirm = regConfirm.value;

        if (!username || !email || !phone || !password) {
          showError('请填写所有必填字段');
          return;
        }
        if (username.length < 2 || username.length > 30) {
          showError('用户名长度需在 2-30 之间');
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) {
          showError('邮箱格式不正确');
          return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
          showError('手机号格式不正确（需为中国大陆11位手机号）');
          return;
        }
        if (password.length < 8) {
          showError('密码至少 8 个字符');
          return;
        }
        if (!/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
          showError('密码需包含字母和数字');
          return;
        }
        if (password !== confirm) {
          showError('两次输入的密码不一致');
          return;
        }

        btnRegister.disabled = true;
        btnRegister.textContent = '注册中...';

        getRegTurnstileToken().then(function(turnstileToken) {
          fetch(API_BASE + '/api/v1/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, email: email, phone: phone, password: password, turnstileToken: turnstileToken })
          })
          .then(function(r) { return r.json(); })
          .then(function(resp) {
            if (resp.success && resp.data) {
              onLoginSuccess(resp.data);
            } else {
              showError(resp.error ? resp.error.message : '注册失败');
              renderRegTurnstileWidget();
            }
          })
          .catch(function() { showError('网络错误，请重试'); })
          .finally(function() {
            btnRegister.disabled = false;
            btnRegister.textContent = '注 册';
          });
        });
      });

      /** 知乎登录 */
      btnZhihu.addEventListener('click', function() {
        var redirectUrl = getRedirectUrl();
        var zhihuAuthUrl = API_BASE + '/api/v1/auth/zhihu';
        if (redirectUrl !== DEFAULT_REDIRECT) {
          zhihuAuthUrl += '?redirect=' + encodeURIComponent(redirectUrl);
        }
        window.location.href = zhihuAuthUrl;
      });

      /** 切换表单 */
      goRegister.addEventListener('click', function() {
        zhihuPrefill = null;
        zhihuHint.style.display = 'none';
        showRegisterForm();
      });
      goLogin.addEventListener('click', function() {
        showLoginForm();
      });

      /** 回车注册 */
      regConfirm.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnRegister.click();
      });

      // 页面加载时：初始化配置 + 检查 hash 回调
      initConfig();
      handleHashCallback();
    })();
  </script>
</body>
</html>
