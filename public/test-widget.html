<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 Widget 测试</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .log { background: #f5f5f5; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; margin: 10px 0; }
    .log-error { color: #e74c3c; }
    .log-ok { color: #27ae60; }
  </style>
  <!-- Turnstile 验证码 JS（必需，用于注册/登录/留言） -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <h1>留言板 Widget 测试</h1>
  <div id="diagnostics" class="log"></div>

  <h2>方式1：JS 初始化</h2>
  <div id="guestbook-container"></div>

  <hr style="margin: 2rem 0;">

  <h2>方式2：HTML 标签</h2>
  <guestbook-widget
    api-base=""
    page-id="/test-page"
  ></guestbook-widget>

  <script>
    // 根据当前访问地址自动确定 API 地址
    var API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8788'
      : window.location.origin;

    var logEl = document.getElementById('diagnostics');
    function log(msg, type) {
      var span = document.createElement('span');
      span.className = type === 'error' ? 'log-error' : type === 'ok' ? 'log-ok' : '';
      span.textContent = msg + '\n';
      logEl.appendChild(span);
    }

    // 设置 HTML 标签方式的 api-base
    document.querySelector('guestbook-widget').setAttribute('api-base', API_BASE);

    log('0. API 地址: ' + API_BASE, 'ok');
    log('1. 检查 customElements API...', '');
    log('   customElements: ' + typeof customElements, typeof customElements === 'object' ? 'ok' : 'error');

    log('2. 加载 widget.js...', '');
  </script>

  <script src="/widget.js"
    onload="log('   widget.js 加载成功', 'ok'); log('3. 检查 GuestbookWidget: ' + typeof window.GuestbookWidget, typeof window.GuestbookWidget === 'object' ? 'ok' : 'error'); if(window.GuestbookWidget){GuestbookWidget.init({container:'#guestbook-container',pageId:'/test-page-js',apiBase:API_BASE,theme:'auto'});log('4. GuestbookWidget.init() 已调用','ok')}else{log('   window.GuestbookWidget 未定义！','error')}"
    onerror="log('   widget.js 加载失败！', 'error')">
  </script>

  <script>
    log('5. 检查 guestbook-widget 元素: ' + document.querySelector('guestbook-widget').shadowRoot?.innerHTML?.substring(0, 100) || '无 shadowRoot', '');
  </script>
</body>
</html>
