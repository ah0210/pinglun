name = "you-guestbook"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "guestbook"
database_id = "bb73bd88-95f9-4c4f-af08-871df6bf3286"

# 非敏感环境变量
[vars]
PUBLIC_URL = "https://you-guestbook.pages.dev"
SITE_NAME = "自游人留言板"
ALLOWED_ORIGINS = "https://www.17you.com,https://you-guestbook.pages.dev"
EMAIL_DOMAIN = "17you.com"
EMAIL_FROM_NAME = "自游人"

# Cron Triggers 需在 Cloudflare Dashboard 中手动配置
# Settings → Functions → Cron triggers → 0 0 * * *
